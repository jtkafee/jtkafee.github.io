rom:"詩篇 55:22",text:"你要把你的重擔卸給耶和華，他必撫養你；他永不叫義人動搖。"},{from:"詩篇 121:1-2",text:"我要向山舉目；我的幫助從何而來？我的幫助從造天地的耶和華而來。"},{from:"腓立比書 4:6",text:"應當一無掛慮，只要凡事藉著禱告、祈求，和感謝，將你們所要的告訴神。"},{from:"約翰福音 14:27",text:"我留下平安給你們；我將我的平安賜給你們。我所賜的，不像世人所賜的。你們心裡不要憂愁，也不要膽怯。"},{from:"以賽亞書 30:15",text:"主耶和華——以色列的聖者曾如此說：你們得救在乎歸回安息，得力在乎平靜安穩。"},{from:"約翰福音 3:16",text:"神愛世人，甚至將他的獨生子賜給他們，叫一切信他的，不致滅亡，反得永生。"},{from:"腓立比書 4:13",text:"我靠著那加給我力量的，凡事都能做。"},{from:"羅馬書 8:28",text:"我們曉得萬事都互相效力，叫愛神的人得益處，就是按他旨意被召的人。"},{from:"提摩太後書 1:7",text:"因為神賜給我們，不是膽怯的心，乃是剛強、仁愛、謹守的心。"},{from:"羅馬書 12:12",text:"在盼望中要喜樂，在患難中要忍耐，禱告要恆切。"},{from:"哥林多前書 13:4",text:"愛是恆久忍耐，又有恩慈；愛是不嫉妒；愛是不自誇，不張狂。"},{from:"哥林多前書 13:13",text:"如今常存的有信，有望，有愛這三樣，其中最大的是愛。"},{from:"帖撒羅尼迦前書 5:16-18",text:"要常常喜樂，常常禱告，凡事謝恩；因為這是神在基督耶穌裡向你們所定的旨意。"},{from:"詩篇 119:105",text:"你的話是我腳前的燈，是我路上的光。"},{from:"約約翰一書 4:18",text:"愛裡沒有懼怕；愛既完全，就把懼怕除去。因為懼怕含著刑罰，懼怕的人在愛裡未得完全。"}]||[],n=[{from:"今日星座運勢",text:"牡羊座：今日整體運勢呈小吉態勢，生活節奏平穩有序。你能在日常事務中找到平衡感，既有精力推進計劃，也能留出時間放鬆身心。雖無重大突破，但小確幸不斷，比如和家人的溫馨互動、完成一項小任務後的滿足感。需注意別因小成就沾沾自喜，保持謙遜態度更易抓住潛藏的機會。"},{from:"今日星座運勢",text:"金牛座：今日整體運勢呈小吉態勢，生活節奏趨於平穩。你對自我狀態的感知力提升，能敏銳捕捉到內心需求，在日常瑣事中找到平衡感。不過部分事務推進速度稍緩，需耐心打磨細節，避免因急於求成而忽略關鍵環節。整體而言，是適合向內探索、沉澱自我的一天，把握好節奏便能收穫小確幸。"},{from:"今日星座運勢",text:"雙子座：今日整體呈小吉態勢，雖無爆發式好運，但各領域多能平穩推進。規劃管理意識的提升讓你對事務節奏把控更清晰，社交上的主動互動也能帶來輕鬆氛圍，不過需警惕消極情緒的蔓延，避免因抱怨消耗自身精力。整體而言，是適合穩紮穩打、維繫關係的一天。"},{from:"今日星座運勢",text:"巨蟹座：今日整體運勢呈小吉態勢，生活節奏平穩順遂。你在人際互動中能自然展現親和力，容易獲得他人的善意回應。不過需注意，部分事務推進可能存在細微阻滯，需保持耐心逐一化解。整體而言，今日是適合沉澱自我、梳理生活細節的一天，雖無重大突破，但小確幸會悄然出現。"},{from:"今日星座運勢",text:"獅子座：今日整體運勢呈小吉態勢，生活節奏平穩中藏著細碎的小確幸。人際互動上的主動調整為你開啟新的溝通視窗，家居整理的小行動能帶來環境清爽的愉悅感，但需警惕久坐帶來的身體不適。整體狀態偏向順遂，只要按部就班處理日常事務，便能收穫內心的安定感。"},{from:"今日星座運勢",text:"處女座：今日整體呈小吉態勢，能量狀態相對穩定，利於按計劃推進事務。生活中能感受到細微的順遂感，人際互動也較為和諧，但需注意避免飲食不當帶來的身體不適。整體節奏平穩，只要保持專注，便能在日常中收穫小確幸。"},{from:"今日星座運勢",text:"天秤座：今日整體運勢呈小吉態勢，雖無爆發式機遇，但各領域節奏平穩可控。你對細節的敏感度提升，能精準捕捉到事務中的最佳化空間，尤其在規劃執行層面，條理感顯著增強。不過需注意，部分環節易因過度追求完美而拖延，建議設定明確時間節點，避免陷入內耗。整體而言，是適合穩步推進計劃、夯實基礎的一天。"},{from:"今日星座運勢",text:"天蠍座：今日整體狀態呈小吉態勢，雖無爆發性機遇，但各領域節奏平穩推進。行動上需錨定目標穩步執行，避免被細枝末節分散精力；人際互動中保持
